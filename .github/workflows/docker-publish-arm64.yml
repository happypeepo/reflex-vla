name: Build and publish arm64 Docker image (Jetson)

# Publishes ghcr.io/fastcrest/reflex-vla:<version>-arm64 for Jetson
# Orin / Orin Nano / Thor. Uses QEMU emulation on the GitHub-hosted
# x86 runner to cross-build for linux/arm64. Build time: ~8-15 min
# (slower than native, but good enough for release cuts).
#
# Triggered on:
#   - tag push matching v*
#   - manual workflow_dispatch (for out-of-cycle publishes)
#
# Goal: docker-arm64-jetson. Closes the 'docker run and go' quickstart
# for Jetson users — currently our published image is x86_64 only.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag suffix (default arm64)"
        required: false
        default: "arm64"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # QEMU enables cross-arch emulation so we can build linux/arm64
      # binaries on the x86 GitHub runner. Slow but free.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag suffix: -arm64. Example: v0.2.0-arm64, latest-arm64.
          # The x86 and arm64 images coexist under different tags; users
          # pick the arch matching their machine. A follow-up workflow
          # can merge them into a single multi-arch manifest when the
          # amd64 + arm64 builds both succeed on the same tag.
          tags: |
            type=ref,event=tag,suffix=-arm64
            type=semver,pattern={{version}},suffix=-arm64
            type=semver,pattern={{major}}.{{minor}},suffix=-arm64
            type=raw,value=latest-arm64,enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.arm64
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache per-arch separately to avoid cross-arch cache poisoning.
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
