name = "reflex-licenses"
main = "worker.js"
compatibility_date = "2026-05-01"

# Ed25519 in Web Crypto is supported natively at recent compatibility_dates;
# no special flag needed since CF added it in 2024.

# Fill in `database_id` after `wrangler d1 create reflex-licenses`.
[[d1_databases]]
binding = "DB"
database_name = "reflex-licenses"
database_id = "92950fbc-a2e3-4cd5-91eb-62713ee44587"

# Optional: bind a custom domain after first deploy.
# routes = [{ pattern = "license.fastcrest.com/*", custom_domain = true }]

# Required Secrets (set via `wrangler secret put`):
#   ADMIN_TOKEN          — bearer token for /admin/* endpoints
#   PRIVATE_KEY          — Ed25519 private key (PKCS8 base64); generated by POST /admin/init
#   SLACK_WEBHOOK_URL    — optional; for new-license + revoke + sharing alerts
